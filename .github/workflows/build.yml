name: Build LaTeX PDFs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install LaTeX and build PDFs
      uses: xu-cheng/latex-action@v3
      with:
        root_file: |
          main.tex
          consent_form.tex
          project_description.tex
          participant_information_sheet.tex
          recruitment_resources.tex
          sample_questions.tex
        latexmk_shell_escape: true
        latexmk_use_xelatex: true
        working_directory: .
        extra_packages: |
          fontspec
          hanging
          sourcecodepro
    
    - name: Upload PDFs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pdfs
        path: |
          main.pdf
          consent_form.pdf
          participant_information_sheet.pdf
          project_description.pdf
          recruitment_resources.pdf
          sample_questions.pdf